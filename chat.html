<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AGASTYANS Chat</title>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="chat.js"></script>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: #0f172a;
  font-family: sans-serif;
  overflow: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  color: white;
  border-bottom: 1px solid #1e293b;
  flex-shrink: 0;
}

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  padding-bottom: 110px;
  color: white;
  scroll-behavior: smooth;
}

/* ── Bottom chat ── */
.bottom-chat {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #0f172a;
  border-top: 1px solid #1e293b;
  padding: 8px 12px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.action-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.msg-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.msg-input {
  flex: 1;
  min-width: 0;
  background: #1e293b;
  border: none;
  border-radius: 25px;
  padding: 10px 14px;
  color: white;
  outline: none;
  font-size: 15px;
}

.icon {
  font-size: 22px;
  color: white;
  cursor: pointer;
  background: none;
  border: none;
}

.send-btn {
  font-size: 22px;
  color: #3b82f6;
  cursor: pointer;
  background: none;
  border: none;
  flex-shrink: 0;
}

#gifBtn { flex-shrink: 0; }

/* ── Message bubble ── */
.msg-bubble {
  position: relative;
  display: inline-block;
  max-width: 75%;
  padding: 8px 12px;
  border-radius: 16px;
  word-break: break-word;
  user-select: none;
  -webkit-user-select: none;
  cursor: pointer;
  transition: opacity 0.15s;
}

.msg-bubble:active { opacity: 0.75; }

.msg-bubble.own {
  background: #2563eb;
  color: white;
  border-bottom-right-radius: 4px;
}

.msg-bubble.other {
  background: #1e293b;
  color: white;
  border-bottom-left-radius: 4px;
}

.edited-tag {
  font-size: 10px;
  opacity: 0.6;
  margin-left: 6px;
}

/* ── Context Menu ── */
#ctxMenu {
  position: fixed;
  z-index: 9999;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none;
  min-width: 160px;
  animation: popIn 0.15s ease;
}

@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 18px;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.ctx-item:hover { background: #334155; }
.ctx-item:not(:last-child) { border-bottom: 1px solid #334155; }
.ctx-item.danger { color: #f87171; }

/* ── Edit bar ── */
#editBar {
  display: none;
  align-items: center;
  gap: 8px;
  background: #1e2a3a;
  border-top: 2px solid #2563eb;
  padding: 8px 12px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
}

#editInput {
  flex: 1;
  background: #1e293b;
  border: none;
  border-radius: 25px;
  padding: 10px 14px;
  color: white;
  outline: none;
  font-size: 15px;
}

.edit-label {
  font-size: 11px;
  color: #60a5fa;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 4px;
  white-space: nowrap;
}

#cancelEditBtn {
  color: #94a3b8;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}

#saveEditBtn {
  color: #3b82f6;
  font-size: 22px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}

/* ── Dim overlay ── */
#ctxOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9998;
  background: rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button onclick="history.back()">←</button>
  <h2 class="font-bold">AGASTYANS</h2>
  <div id="onlineCount"></div>
  <button id="logoutBtn" class="text-red-400">Logout</button>
</div>

<!-- MESSAGES -->
<div class="messages" id="messagesContainer"></div>

<!-- BOTTOM CHAT -->
<div class="bottom-chat" id="normalBar">

  <!-- ICON ROW — hides when typing -->
  <div class="action-row" id="actionRow">
    <label class="icon">
      🖼
      <input type="file" hidden accept="image/*">
    </label>
    <button id="voiceBtn" class="icon">🎤</button>
    <button id="gifBtn" class="icon">GIF</button>
  </div>

  <!-- MESSAGE INPUT + SEND BUTTON -->
  <div class="msg-row">
    <input id="msgInput" type="text" placeholder="Message..." class="msg-input" />
    <button id="sendBtn" class="send-btn" style="display:none">➤</button>
  </div>

</div>

<!-- EDIT BAR -->
<div id="editBar">
  <button id="cancelEditBtn">✕</button>
  <span class="edit-label">✏️ Edit</span>
  <input id="editInput" type="text" placeholder="Edit message..." />
  <button id="saveEditBtn">➤</button>
</div>

<!-- CONTEXT MENU OVERLAY -->
<div id="ctxOverlay"></div>

<!-- CONTEXT MENU -->
<div id="ctxMenu">
  <button class="ctx-item" id="ctxEdit">✏️ &nbsp;Edit</button>
  <button class="ctx-item danger" id="ctxDelete">🗑️ &nbsp;Delete</button>
</div>

<script>
/* ══════════════════════════════════════════
   SEND BUTTON — show when typing, hide when empty
   Icons hide when typing to keep it clean
══════════════════════════════════════════ */
const msgInput  = document.getElementById('msgInput');
const sendBtn   = document.getElementById('sendBtn');
const actionRow = document.getElementById('actionRow');

msgInput.addEventListener('input', () => {
  const hasText = msgInput.value.trim().length > 0;
  sendBtn.style.display   = hasText ? 'block' : 'none';
  actionRow.style.display = hasText ? 'none'  : 'flex';
});

// Send on button click
sendBtn.addEventListener('click', sendMessage);

// Send on Enter key
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  // Dispatch event so chat.js can pick it up
  msgInput.dispatchEvent(new CustomEvent('sendMessage', { detail: text, bubbles: true }));
  msgInput.value = '';
  sendBtn.style.display   = 'none';
  actionRow.style.display = 'flex';
}

/* ══════════════════════════════════════════
   HOLD-TO-SHOW context menu (own messages only)
══════════════════════════════════════════ */
let holdTimer    = null;
let activeMsgEl  = null;
let activeMsgId  = null;
let editingMsgId = null;

const HOLD_DURATION = 500; // ms

const ctxMenu    = document.getElementById('ctxMenu');
const ctxOverlay = document.getElementById('ctxOverlay');
const ctxEdit    = document.getElementById('ctxEdit');
const ctxDelete  = document.getElementById('ctxDelete');
const normalBar  = document.getElementById('normalBar');
const editBar    = document.getElementById('editBar');
const editInput  = document.getElementById('editInput');

function showCtxMenu(x, y) {
  ctxMenu.style.display   = 'block';
  ctxOverlay.style.display = 'block';
  const mw = 170, mh = 110;
  const vw = window.innerWidth, vh = window.innerHeight;
  ctxMenu.style.left = Math.min(x, vw - mw - 8) + 'px';
  ctxMenu.style.top  = Math.min(y, vh - mh - 8) + 'px';
}

function hideCtxMenu() {
  ctxMenu.style.display   = 'none';
  ctxOverlay.style.display = 'none';
  activeMsgEl = null;
  activeMsgId = null;
}

/* Attach to a bubble — only works if isOwn = true */
function attachHoldListeners(bubble, msgId, isOwn) {
  if (!isOwn) return;

  // Touch long press
  bubble.addEventListener('touchstart', (e) => {
    holdTimer = setTimeout(() => {
      const touch = e.touches[0];
      activeMsgEl = bubble;
      activeMsgId = msgId;
      showCtxMenu(touch.clientX, touch.clientY - 120);
      navigator.vibrate?.(30);
    }, HOLD_DURATION);
  }, { passive: true });

  bubble.addEventListener('touchend',    () => clearTimeout(holdTimer));
  bubble.addEventListener('touchmove',   () => clearTimeout(holdTimer));
  bubble.addEventListener('touchcancel', () => clearTimeout(holdTimer));

  // Right-click (desktop)
  bubble.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    activeMsgEl = bubble;
    activeMsgId = msgId;
    showCtxMenu(e.clientX, e.clientY - 80);
  });

  // Mouse long press (desktop)
  let mouseHold;
  bubble.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    mouseHold = setTimeout(() => {
      activeMsgEl = bubble;
      activeMsgId = msgId;
      showCtxMenu(e.clientX, e.clientY - 80);
    }, HOLD_DURATION);
  });
  bubble.addEventListener('mouseup',    () => clearTimeout(mouseHold));
  bubble.addEventListener('mouseleave', () => clearTimeout(mouseHold));
}

// Close menu when tapping outside
ctxOverlay.addEventListener('click',    hideCtxMenu);
ctxOverlay.addEventListener('touchend', hideCtxMenu);

/* ── EDIT action ── */
ctxEdit.addEventListener('click', () => {
  if (!activeMsgEl || !activeMsgId) return;

  const textNode    = activeMsgEl.querySelector('.msg-text');
  const currentText = textNode ? textNode.textContent : '';

  editingMsgId    = activeMsgId;
  editInput.value = currentText;

  normalBar.style.display = 'none';
  editBar.style.display   = 'flex';
  editInput.focus();

  hideCtxMenu();
});

document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);

function cancelEdit() {
  editingMsgId = null;
  editBar.style.display   = 'none';
  normalBar.style.display = 'flex';
}

document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
editInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveEdit(); });

async function saveEdit() {
  const newText = editInput.value.trim();
  if (!newText || !editingMsgId) return;

  try {
    const { error } = await db
      .from('chat_messages')
      .update({ message: newText, edited: true })
      .eq('id', editingMsgId);

    if (error) throw error;

    // Update bubble text in UI immediately
    const bubble = document.querySelector(`[data-msg-id="${editingMsgId}"]`);
    if (bubble) {
      const textNode = bubble.querySelector('.msg-text');
      if (textNode) textNode.textContent = newText;

      if (!bubble.querySelector('.edited-tag')) {
        const tag = document.createElement('span');
        tag.className  = 'edited-tag';
        tag.textContent = 'edited';
        bubble.appendChild(tag);
      }
    }
  } catch (err) {
    alert('Could not edit: ' + err.message);
  }

  cancelEdit();
}

/* ── DELETE action ── */
ctxDelete.addEventListener('click', async () => {
  if (!activeMsgId) return;
  const msgId  = activeMsgId;
  const bubble = activeMsgEl;
  hideCtxMenu();

  if (!confirm('Delete this message?')) return;

  try {
    const { error } = await db
      .from('chat_messages')
      .delete()
      .eq('id', msgId);

    if (error) throw error;

    const row = bubble.closest('.msg-row-wrapper') || bubble.parentElement;
    row?.remove();
  } catch (err) {
    alert('Could not delete: ' + err.message);
  }
});

/* ══════════════════════════════════════════
   renderMessage(row)
   Call this from chat.js for each message.

   Before calling, set: window.currentUserId = user.id

   row fields:
     id        — uuid
     message   — text
     user_id   — uuid
     edited    — boolean
     username  — text (optional, for display)
══════════════════════════════════════════ */
function renderMessage(row) {
  const isOwn = row.user_id === window.currentUserId;

  const wrapper = document.createElement('div');
  wrapper.className = 'msg-row-wrapper flex mb-3 ' + (isOwn ? 'justify-end' : 'justify-start');

  const bubble = document.createElement('div');
  bubble.className    = 'msg-bubble ' + (isOwn ? 'own' : 'other');
  bubble.dataset.msgId = row.id;

  // Username (for other people's messages)
  if (!isOwn && row.username) {
    const nameEl = document.createElement('div');
    nameEl.style.cssText = 'font-size:11px;opacity:0.6;margin-bottom:2px;';
    nameEl.textContent   = row.username;
    bubble.appendChild(nameEl);
  }

  const textSpan = document.createElement('span');
  textSpan.className   = 'msg-text';
  textSpan.textContent = row.message;
  bubble.appendChild(textSpan);

  if (row.edited) {
    const tag = document.createElement('span');
    tag.className   = 'edited-tag';
    tag.textContent = 'edited';
    bubble.appendChild(tag);
  }

  wrapper.appendChild(bubble);
  document.getElementById('messagesContainer').appendChild(wrapper);

  attachHoldListeners(bubble, row.id, isOwn);
}

/* ── Logout ── */
document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (!confirm('Are you sure you want to logout?')) return;
  try {
    const { error } = await db.auth.signOut();
    if (error) throw error;
    window.location.href = 'index.html';
  } catch (err) {
    alert('Logout failed: ' + err.message);
  }
});
</script>
</body>
</html>
