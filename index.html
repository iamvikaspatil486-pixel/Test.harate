<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGASTYANS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changed from center to allow scrolling */
            min-height: 100vh;
            margin: 0;
            padding-top: 40px; /* Gives some space at the top */
            padding-bottom: 40px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 14px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            transition: 0.2s;
            text-decoration: none;
            color: white;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* Colors */
        .register { 
            background: linear-gradient(to r, #0891b2, #2563eb);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .home { background: #1e293b; }
        .chat { background: #3b82f6; }
        .comments { background: #10b981; }
        .notice { background: #f59e0b; }
    </style>
</head>

<body>

<div class="container">

    <h1 style="text-align:center; font-size:26px; margin-bottom:24px; font-weight: bold; letter-spacing: 1px;">
        AGASTYANS 🚀
    </h1>

    <!-- JOIN NOW / REGISTER -->
    <a href="registration.html" class="btn register">
        ✨ Join Now
    </a>

    <!-- HOME -->
    <a href="home.html" class="btn home">
        🏠 Home
    </a>

    <!-- CHAT -->
    <a href="chat.html" class="btn chat">
        💬 Chat
    </a>

    <!-- COMMENTS -->
    <a href="comments.html" class="btn comments">
        💭 Comments
    </a>

    <!-- NOTICE -->
    <a href="notice.html" class="btn notice">
        📢 Notice
    </a>

</div>

</body>
</html>
