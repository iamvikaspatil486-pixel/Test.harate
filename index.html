<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGASTYANS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            /* Removed flex-center to prevent "hiding" content off-screen */
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px; /* Padding at top ensures Title isn't stuck to edge */
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 14px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            transition: 0.2s;
            text-decoration: none;
            color: white;
            box-sizing: border-box;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        /* Specific Button Colors */
        .register { 
            background: linear-gradient(to r, #06b6d4, #3b82f6);
            margin-bottom: 24px; /* Extra space after Join Now */
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
        }
        .home { background: #1e293b; }
        .chat { background: #3b82f6; }
        .comments { background: #10b981; }
        .notice { background: #f59e0b; }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            color: white;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="container">

        <h1 class="title">
            AGASTYANS 🚀
        </h1>

        <!-- JOIN NOW / REGISTER -->
        <a href="registration.html" class="btn register">
            ✨ Join Now
        </a>

        <!-- HOME -->
        <a href="home.html" class="btn home">
            🏠 Home
        </a>

        <!-- CHAT -->
        <a href="chat.html" class="btn chat">
            💬 Chat
        </a>

        <!-- COMMENTS -->
        <a href="comments.html" class="btn comments">
            💭 Comments
        </a>

        <!-- NOTICE -->
        <a href="notice.html" class="btn notice">
            📢 Notice
        </a>

    </div>
</div>

</body>
</html>
